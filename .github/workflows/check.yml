name: Check

on:
    push:
        branches: ['main', 'release']
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check
              run: bun run check

            - name: Build
              run: bun run build
